[program:api]
command=npx tsx watch server/index.ts
directory=/app
autostart=true
autorestart=true
environment=NODE_ENV="development",PORT="3100",CHOKIDAR_USEPOLLING="1",KBC_DATAAPP_MODE="preview"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
